<mat-card class="transactions-card">
  <mat-card-header>
    <mat-card-title>Recent Transactions</mat-card-title>
    <a mat-button routerLink="/transactions/history" class="view-all-btn">
      View All
      <mat-icon>arrow_forward</mat-icon>
    </a>
  </mat-card-header>

  <mat-card-content>
    <!-- Empty State -->
    <div class="empty-state" *ngIf="!transactions || transactions.length === 0">
      <mat-icon>receipt_long</mat-icon>
      <p>No recent transactions</p>
    </div>

    <!-- Transaction List -->
    <div class="transaction-list" *ngIf="transactions && transactions.length > 0">
      <div class="transaction-item" *ngFor="let transaction of transactions; let last = last">
        <div class="transaction-icon" [ngClass]="transaction.type">
          <mat-icon>{{ getTransactionIcon(transaction.type) }}</mat-icon>
        </div>
        
        <div class="transaction-details">
          <span class="transaction-description">{{ transaction.description }}</span>
          <span class="transaction-date">{{ transaction.date | dateFormat:'datetime' }}</span>
        </div>
        
        <div class="transaction-amount" [ngClass]="transaction.type">
          {{ getAmountPrefix(transaction.type) }}{{ transaction.amount | currencyFormat }}
        </div>
        
        <mat-divider *ngIf="!last"></mat-divider>
      </div>
    </div>
  </mat-card-content>
</mat-card>
