<div class="dashboard-container">
  <!-- Loading State -->
  <div class="loading-container" *ngIf="isLoading">
    <mat-spinner diameter="48"></mat-spinner>
    <p>Loading your dashboard...</p>
  </div>

  <!-- Dashboard Content -->
  <ng-container *ngIf="!isLoading">
    <!-- Page Header -->
    <div class="page-header">
      <h1 class="page-title">Dashboard</h1>
      <p class="page-subtitle">Welcome back! Here's your account overview.</p>
    </div>

    <!-- Main Grid -->
    <div class="dashboard-grid">
      <!-- Account Summary -->
      <div class="grid-item account-summary-section">
        <app-account-summary [account]="account"></app-account-summary>
      </div>

      <!-- Quick Actions -->
      <div class="grid-item quick-actions-section">
        <app-quick-actions></app-quick-actions>
      </div>

      <!-- Recent Transactions -->
      <div class="grid-item transactions-section">
        <app-recent-transactions [transactions]="recentTransactions"></app-recent-transactions>
      </div>

      <!-- Additional Cards -->
      <div class="grid-item stats-section">
        <mat-card class="stat-card">
          <mat-card-content>
            <div class="stat-header">
              <mat-icon class="stat-icon income">trending_up</mat-icon>
              <span class="stat-label">This Month's Income</span>
            </div>
            <div class="stat-value income">+$5,200.00</div>
            <div class="stat-change positive">
              <mat-icon>arrow_upward</mat-icon>
              <span>12% from last month</span>
            </div>
          </mat-card-content>
        </mat-card>

        <mat-card class="stat-card">
          <mat-card-content>
            <div class="stat-header">
              <mat-icon class="stat-icon expense">trending_down</mat-icon>
              <span class="stat-label">This Month's Expenses</span>
            </div>
            <div class="stat-value expense">-$2,340.24</div>
            <div class="stat-change negative">
              <mat-icon>arrow_downward</mat-icon>
              <span>5% from last month</span>
            </div>
          </mat-card-content>
        </mat-card>
      </div>
    </div>
  </ng-container>
</div>
