<div class="sidebar-container" [class.collapsed]="isCollapsed">
  <!-- Logo Section -->
  <div class="sidebar-logo">
    <div class="logo-icon">
      <mat-icon>account_balance</mat-icon>
    </div>
    <span class="logo-text" *ngIf="!isCollapsed">SecureBank</span>
  </div>

  <!-- Navigation Menu -->
  <nav class="sidebar-nav">
    <mat-nav-list>
      <!-- Main Menu Items -->
      <button mat-list-item
         *ngFor="let item of menuItems"
        [class.active]="isActive(item.route, item.exact)"
         [matTooltip]="item.label"
         [matTooltipDisabled]="!isCollapsed"
         matTooltipPosition="right"
         type="button"
        (click)="onMenuItemClick(item.route, $event)">
        <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
        <span matListItemTitle *ngIf="!isCollapsed">{{ item.label }}</span>
      </button>

      <!-- Admin Section -->
      <ng-container *ngIf="authService.isAdmin()">
        <mat-divider class="nav-divider"></mat-divider>
        
        <div class="nav-section-title" *ngIf="!isCollapsed">
          Admin
        </div>

        <button mat-list-item
           *ngFor="let item of adminMenuItems"
            [class.active]="isActive(item.route, item.exact)"
           [matTooltip]="item.label"
           [matTooltipDisabled]="!isCollapsed"
           matTooltipPosition="right"
           type="button"
            (click)="onMenuItemClick(item.route, $event)">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle *ngIf="!isCollapsed">{{ item.label }}</span>
        </button>
      </ng-container>
    </mat-nav-list>
  </nav>

  <!-- Bottom Section -->
  <div class="sidebar-footer" *ngIf="!isCollapsed">
    <div class="footer-text">
      <small>SecureBank v1.0</small>
    </div>
  </div>
</div>
