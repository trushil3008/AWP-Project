<header class="navbar-shell">
  <mat-toolbar class="header-toolbar">
    <div class="navbar-left">
      <button mat-icon-button class="mobile-menu-btn" (click)="toggleMobileNav()" type="button">
        <mat-icon>{{ isMobileNavOpen ? 'close' : 'menu' }}</mat-icon>
      </button>

      <button class="brand" mat-button (click)="onNavClick(authService.isAdmin() ? '/admin' : '/dashboard')" type="button">
        <span class="brand-mark">SB</span>
        <span class="brand-name">SecureBank</span>
      </button>
    </div>

    <nav class="desktop-nav" aria-label="Main navigation">
      <ng-container *ngIf="!authService.isAdmin()">
        <button
          *ngFor="let item of navItems"
          mat-button
          type="button"
          class="nav-link"
          [class.active]="isActive(item.route, item.exact)"
          (click)="onNavClick(item.route)">
          <mat-icon>{{ item.icon }}</mat-icon>
          <span>{{ item.label }}</span>
        </button>
      </ng-container>

      <ng-container *ngIf="authService.isAdmin()">
        <button
          *ngFor="let item of adminNavItems"
          mat-button
          type="button"
          class="nav-link admin-link"
          [class.active]="isActive(item.route, item.exact)"
          (click)="onNavClick(item.route)">
          <mat-icon>{{ item.icon }}</mat-icon>
          <span>{{ item.label }}</span>
        </button>
      </ng-container>
    </nav>

    <div class="navbar-right">
      <div class="user-profile-static" *ngIf="authService.currentUser$ | async as user">
        <div class="user-avatar">
          {{ getInitials(user?.name) }}
        </div>
        <div class="user-brief">
          <span class="greeting-text">{{ getGreeting() }}</span>
          <span class="user-name">{{ user?.name || 'User' }}</span>
        </div>
      </div>

      <button mat-stroked-button type="button" class="logout-btn" (click)="confirmLogout()">
        <mat-icon>logout</mat-icon>
        <span>Logout</span>
      </button>
    </div>
  </mat-toolbar>

  <nav class="mobile-nav" [class.open]="isMobileNavOpen" aria-label="Mobile navigation">
    <ng-container *ngIf="!authService.isAdmin()">
      <button
        *ngFor="let item of navItems"
        mat-stroked-button
        type="button"
        class="mobile-link"
        [class.active]="isActive(item.route, item.exact)"
        (click)="onNavClick(item.route)">
        <mat-icon>{{ item.icon }}</mat-icon>
        <span>{{ item.label }}</span>
      </button>
    </ng-container>

    <ng-container *ngIf="authService.isAdmin()">
      <button
        *ngFor="let item of adminNavItems"
        mat-stroked-button
        type="button"
        class="mobile-link admin-link"
        [class.active]="isActive(item.route, item.exact)"
        (click)="onNavClick(item.route)">
        <mat-icon>{{ item.icon }}</mat-icon>
        <span>{{ item.label }}</span>
      </button>
    </ng-container>

    <button
      mat-stroked-button
      type="button"
      class="mobile-link logout-mobile"
      (click)="confirmLogout()">
      <mat-icon>logout</mat-icon>
      <span>Logout</span>
    </button>
  </nav>
</header>
